<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/><stop offset="100%" style="stop-color:#0c1445"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f6ef7"/><stop offset="50%" style="stop-color:#a855f7"/><stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/><stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/><line x1="960" y1="0" x2="960" y2="320"/>
  </g>
  <circle cx="120" cy="160" r="130" fill="#4f6ef7" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1100" cy="100" r="110" fill="#a855f7" opacity="0.06" filter="url(#glow)"/>
  <!-- Shield -->
  <g transform="translate(72, 76)" filter="url(#glow)">
    <path d="M78 8 L138 34 L138 82 Q138 132 78 155 Q18 132 18 82 L18 34 Z" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <path d="M78 28 L120 50 L120 86 Q120 120 78 136 Q36 120 36 86 L36 50 Z" fill="#4f6ef724" stroke="#4f6ef7" stroke-width="1.5"/>
    <path d="M56 82 L70 96 L100 66" stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Right chart -->
  <g transform="translate(990, 60)" opacity="0.3">
    <rect x="0"   y="130" width="22" height="110" rx="3" fill="#4f6ef7"/>
    <rect x="30"  y="70"  width="22" height="170" rx="3" fill="#ef4444"/>
    <rect x="60"  y="100" width="22" height="140" rx="3" fill="#4f6ef7"/>
    <rect x="90"  y="55"  width="22" height="185" rx="3" fill="#ef4444"/>
    <rect x="120" y="90"  width="22" height="150" rx="3" fill="#4f6ef7"/>
    <rect x="150" y="80"  width="22" height="160" rx="3" fill="#a855f7"/>
    <line x1="-5" y1="120" x2="190" y2="120" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,3"/>
  </g>
  <!-- Metric cards -->
  <g transform="translate(830, 55)" opacity="0.55">
    <rect x="0" y="0"   width="108" height="42" rx="7" fill="#1e293b" stroke="#334155"/>
    <text x="9" y="15"  fill="#64748b" font-size="9" font-family="monospace">SPD (before)</text>
    <text x="9" y="32"  fill="#ef4444" font-size="13" font-weight="bold" font-family="monospace">-0.183</text>
    <rect x="0" y="50"  width="108" height="42" rx="7" fill="#1e293b" stroke="#334155"/>
    <text x="9" y="65"  fill="#64748b" font-size="9" font-family="monospace">Disparate Impact</text>
    <text x="9" y="82"  fill="#f59e0b" font-size="13" font-weight="bold" font-family="monospace">0.721</text>
    <rect x="0" y="100" width="108" height="42" rx="7" fill="#052e16" stroke="#166534"/>
    <text x="9" y="115" fill="#64748b" font-size="9" font-family="monospace">SPD (after)</text>
    <text x="9" y="132" fill="#22c55e" font-size="13" font-weight="bold" font-family="monospace">-0.031</text>
    <rect x="0" y="150" width="108" height="42" rx="7" fill="#052e16" stroke="#166534"/>
    <text x="9" y="165" fill="#64748b" font-size="9" font-family="monospace">DI (after)</text>
    <text x="9" y="182" fill="#22c55e" font-size="13" font-weight="bold" font-family="monospace">0.962</text>
  </g>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>
  <!-- Title -->
  <text x="240" y="108" font-family="'Inter', -apple-system, sans-serif" font-size="44" font-weight="900" fill="url(#tg)" letter-spacing="-1">AI Fairness Platform</text>
  <text x="241" y="146" font-family="'Inter', -apple-system, sans-serif" font-size="17" fill="#64748b">Detecting and Mitigating Bias in Machine Learning Models</text>
  <!-- Pills -->
  <g transform="translate(241, 170)">
    <rect x="0"   y="0" width="128" height="26" rx="13" fill="#1e293b" stroke="#334155"/>
    <text x="14"  y="17" fill="#4f6ef7" font-size="12" font-family="monospace">8 Fairness Metrics</text>
    <rect x="136" y="0" width="152" height="26" rx="13" fill="#1e293b" stroke="#334155"/>
    <text x="150" y="17" fill="#a855f7" font-size="12" font-family="monospace">6 Mitigation Algos</text>
    <rect x="296" y="0" width="112" height="26" rx="13" fill="#1e293b" stroke="#334155"/>
    <text x="310" y="17" fill="#22c55e" font-size="12" font-family="monospace">SHAP + LIME XAI</text>
    <rect x="416" y="0" width="120" height="26" rx="13" fill="#1e293b" stroke="#334155"/>
    <text x="430" y="17" fill="#f59e0b" font-size="12" font-family="monospace">Drift Monitoring</text>
  </g>
  <text x="241" y="225" font-family="monospace" font-size="11" fill="#334155">FastAPI · React · Scikit-Learn · XGBoost · LightGBM · Fairlearn · AIF360 · SHAP · MLflow · Docker</text>
  <!-- Severity legend -->
  <g transform="translate(241, 255)">
    <circle cx="7"   cy="7" r="5" fill="#22c55e"/><text x="17" y="12" fill="#64748b" font-size="10">None</text>
    <circle cx="65"  cy="7" r="5" fill="#84cc16"/><text x="75" y="12" fill="#64748b" font-size="10">Low</text>
    <circle cx="115" cy="7" r="5" fill="#f59e0b"/><text x="125" y="12" fill="#64748b" font-size="10">Medium</text>
    <circle cx="178" cy="7" r="5" fill="#f97316"/><text x="188" y="12" fill="#64748b" font-size="10">High</text>
    <circle cx="230" cy="7" r="5" fill="#ef4444"/><text x="240" y="12" fill="#64748b" font-size="10">Critical</text>
  </g>
  <rect x="0" y="317" width="1280" height="3" fill="url(#accent)" opacity="0.4"/>
