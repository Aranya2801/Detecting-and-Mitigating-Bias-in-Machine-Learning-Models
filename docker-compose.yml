version: "3.9"

networks:
  fairness:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mlflow_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fairness
      POSTGRES_PASSWORD: fairness_dev_password
      POSTGRES_DB: fairness_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    networks: [fairness]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairness"]
      interval: 10s timeout: 5s retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports: ["6379:6379"]
    networks: [fairness]

  backend:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fairness:fairness_dev_password@postgres:5432/fairness_db
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
    ports: ["8000:8000"]
    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
      - ./datasets:/app/datasets
    networks: [fairness]

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on: [backend]
    ports: ["3000:3000"]
    networks: [fairness]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    restart: unless-stopped
    command: >
      mlflow server
      --backend-store-uri postgresql://fairness:fairness_dev_password@postgres:5432/fairness_db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
    volumes:
      - mlflow_data:/mlflow/artifacts
    depends_on:
      postgres: {condition: service_healthy}
    ports: ["5000:5000"]
    networks: [fairness]
