name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fairness
          POSTGRES_PASSWORD: fairness_test
          POSTGRES_DB: fairness_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://fairness:fairness_test@localhost:5432/fairness_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: pytest -v --cov=app --cov-report=xml --cov-report=term-missing
      - uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - run: npm install --legacy-peer-deps
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: fairness-platform-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
